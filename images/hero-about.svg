<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" fill="#f5f3ff"/>

  <!-- Background blobs -->
  <ellipse cx="1120" cy="80" rx="300" ry="300" fill="#ede9fe" opacity="0.55"/>
  <ellipse cx="80" cy="380" rx="260" ry="260" fill="#ddd6fe" opacity="0.4"/>
  <ellipse cx="600" cy="-40" rx="380" ry="200" fill="#ede9fe" opacity="0.35"/>

  <!-- Concentric rings (centre identity concept) -->
  <circle cx="600" cy="210" r="180" fill="none" stroke="#ddd6fe" stroke-width="1.5"/>
  <circle cx="600" cy="210" r="140" fill="none" stroke="#c4b5fd" stroke-width="1.5"/>
  <circle cx="600" cy="210" r="100" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="600" cy="210" r="60" fill="#7c3aed" opacity="0.08"/>

  <!-- Central avatar / brand mark -->
  <circle cx="600" cy="185" r="44" fill="white" stroke="#c4b5fd" stroke-width="2"/>
  <circle cx="600" cy="175" r="18" fill="#7c3aed"/>
  <ellipse cx="600" cy="215" rx="30" ry="18" fill="#7c3aed"/>
  <!-- Letter A on avatar -->
  <text x="600" y="181" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="white">A</text>

  <!-- Name plate below avatar -->
  <rect x="548" y="235" width="104" height="28" rx="14" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="600" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#7c3aed">Athys SEO Blog</text>

  <!-- Floating achievement badges on the ring -->
  <!-- Top badge -->
  <g transform="translate(600, 30)">
    <rect x="-46" y="-18" width="92" height="36" rx="18" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">SEO Expertise</text>
  </g>

  <!-- Right badge -->
  <g transform="translate(780, 210)">
    <rect x="-52" y="-18" width="104" height="36" rx="18" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">Actionable Guides</text>
  </g>

  <!-- Left badge -->
  <g transform="translate(420, 210)">
    <rect x="-48" y="-18" width="96" height="36" rx="18" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">Real Strategies</text>
  </g>

  <!-- Bottom badge -->
  <g transform="translate(600, 390)">
    <rect x="-50" y="-18" width="100" height="36" rx="18" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">Weekly Insights</text>
  </g>

  <!-- Dot on each ring intersection -->
  <circle cx="600" cy="30" r="6" fill="#7c3aed"/>
  <circle cx="780" cy="210" r="6" fill="#7c3aed"/>
  <circle cx="420" cy="210" r="6" fill="#7c3aed"/>
  <circle cx="600" cy="390" r="6" fill="#7c3aed"/>

  <!-- Left side: upward bar chart -->
  <g transform="translate(120, 120)">
    <rect x="0" y="140" width="28" height="60" rx="4" fill="#c4b5fd"/>
    <rect x="38" y="100" width="28" height="100" rx="4" fill="#a78bfa"/>
    <rect x="76" y="60" width="28" height="140" rx="4" fill="#8b5cf6"/>
    <rect x="114" y="20" width="28" height="180" rx="4" fill="#7c3aed"/>
    <!-- Baseline -->
    <line x1="0" y1="200" x2="150" y2="200" stroke="#c4b5fd" stroke-width="1.5"/>
    <!-- Up arrow -->
    <path d="M148 0 L165 20 M148 0 L131 20" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <line x1="148" y1="0" x2="148" y2="20" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Right side: shield / trust badge -->
  <g transform="translate(960, 110)">
    <path d="M90 0 L180 35 L180 110 Q180 165 90 200 Q0 165 0 110 L0 35 Z" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
    <path d="M90 25 L160 53 L160 115 Q160 158 90 185 Q20 158 20 115 L20 53 Z" fill="white" opacity="0.7"/>
    <!-- Check mark inside shield -->
    <path d="M55 100 L78 125 L128 72" stroke="#7c3aed" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Sparkle stars scattered -->
  <path d="M200 70 L204 60 L208 70 L218 74 L208 78 L204 88 L200 78 L190 74 Z" fill="#7c3aed" opacity="0.4"/>
  <path d="M990 370 L993 362 L996 370 L1004 373 L996 376 L993 384 L990 376 L982 373 Z" fill="#8b5cf6" opacity="0.45"/>
  <path d="M80 160 L83 153 L86 160 L93 163 L86 166 L83 173 L80 166 L73 163 Z" fill="#a78bfa" opacity="0.5"/>
  <path d="M1100 290 L1103 283 L1106 290 L1113 293 L1106 296 L1103 303 L1100 296 L1093 293 Z" fill="#7c3aed" opacity="0.4"/>

  <!-- Small floating dots -->
  <circle cx="300" cy="360" r="5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="330" cy="340" r="3" fill="#c4b5fd"/>
  <circle cx="270" cy="335" r="4" fill="#8b5cf6" opacity="0.5"/>
  <line x1="300" y1="360" x2="330" y2="340" stroke="#ddd6fe" stroke-width="1.5"/>
  <line x1="300" y1="360" x2="270" y2="335" stroke="#ddd6fe" stroke-width="1.5"/>

  <circle cx="900" cy="55" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="930" cy="35" r="3" fill="#c4b5fd"/>
  <circle cx="870" cy="40" r="3" fill="#8b5cf6" opacity="0.5"/>
  <line x1="900" y1="55" x2="930" y2="35" stroke="#ddd6fe" stroke-width="1.5"/>
  <line x1="900" y1="55" x2="870" y2="40" stroke="#ddd6fe" stroke-width="1.5"/>
</svg>
